openapi: 3.0.4
info:
  title: IoT-agriculture-system
  description: |-
    The API Document for the GreenHouse IoT agriculture system Project
  contact:
    email: vietanh.nguyengia2004@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  version: 1.0.0

externalDocs:
  description: Project Report
  url: https://docs.google.com/document/d/1F7LzBfBn3crr_0gjnN5M0dfY3SmUyMfgwxlUZx6ZV3Y/edit?tab=t.0#heading=h.sz7rmkyndus0

servers:
  - url: http://localhost:3000/api

tags:
  - name: sensor_data
    description: Data collected from the sensors. The collecting rate is 2 seconds.
  - name: device
    description: The current IoT system consists of 5 devices.
  - name: action
    description: All the actions performed on the devices.

paths:
  /sensor-data:
    get:
      summary: Sensor Data API
      description: Get a list of sensor data records with pagination and filtering.
      tags: [sensor_data]
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
          description: "Integer, Min: 1"
        - name: items
          in: query
          required: false
          schema:
            type: integer
            default: 10
            enum: [5, 10, 15, 20]
          description: "One of: 5, 10, 20"
        - name: type
          in: query
          required: false
          schema:
            type: string
            enum: [temperature, humidity, light]
          description: "One of: temperature, humidity, light"
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 50
          description: String, Max 50 chars
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            default: measuredAt
            enum: [measuredAt, value]
          description: "One of: measuredAt, value"
        - name: sortOrder
          in: query
          required: false
          schema:
            type: string
            default: DESC
            enum: [ASC, DESC]
          description: "One of: ASC, DESC"
      responses:
        "200":
          description: Paginated sensor data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/paginated_sensor_data"

  /sensor-data/latest:
    get:
      summary: Latest Sensor Data API
      description: Retrieves the most recent record for each sensor type.
      tags: [sensor_data]
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/sensor_data"

  /devices/status:
    get:
      summary: Device Status API
      description: Retrieves all device statuses.
      tags: [device]
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/device"

  /devices/{id}/action:
    post:
      summary: Control Device API
      tags: [device]
      parameters:
        - in: path
          name: id
          required: true
          description: Positive Integer ID of the device.
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [TURN_ON, TURN_OFF, BLINK_ALL, BLINK_EACH, ALL_ON, ALL_OFF]
      responses:
        "200":
          description: Successful response

  /actions:
    get:
      summary: Action History API
      tags: [action]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: items
          in: query
          schema:
            type: integer
            default: 10
            enum: [5, 10, 15, 20]
        - name: status
          in: query
          schema:
            type: string
            maxLength: 20
        - name: search
          in: query
          schema:
            type: string
            maxLength: 50
        - name: sortBy
          in: query
          schema:
            type: string
            default: interactedAt
            enum: [interactedAt, id]
        - name: sortOrder
          in: query
          schema:
            type: string
            default: DESC
            enum: [ASC, DESC]
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/paginated_action"

components:
  schemas:
    sensor_data:
      type: object
      properties:
        id:
          type: integer
          format: int64
        value:
          type: number
          format: float
        measuredAt:
          type: string
          format: date-time
        type:
          type: string
        sensorId:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        sensor:
          type: object
          properties:
            name:
              type: string

    device:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        status:
          type: string

    action:
      type: object
      properties:
        id:
          type: integer
          format: int64
        action:
          type: string
        status:
          type: string
        interactedAt:
          type: string
          format: date-time
        device_id:
          type: integer
          format: int64

    paginated_sensor_data:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: "#/components/schemas/sensor_data"
        pagination:
          type: object
          properties:
            totalItems:
              type: integer
            totalPages:
              type: integer
            currentPage:
              type: integer
            itemsPerPage:
              type: integer

    paginated_action:
      type: object
      properties:
        page:
          type: integer
        items:
          type: integer
        total:
          type: integer
        data:
          type: array
          items:
            $ref: "#/components/schemas/action"